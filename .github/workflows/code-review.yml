name: Deltek CodeSentinel

# Trigger on pull request events targeting main branch
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

# Set permissions for the workflow
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    name: Deltek CodeSentinel Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for better context
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: npm start

      - name: Review Complete
        if: success()
        run: echo "✅ Code review completed successfully!"

      - name: Review Failed
        if: failure()
        run: |
          echo "❌ Code review failed. Check the logs above for details."
          echo "The PR author has been notified of the failure."
