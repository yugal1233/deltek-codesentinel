name: Deltek CodeSentinel

# Trigger on pull request events targeting main branch
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

# Set permissions for the workflow
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    name: Deltek CodeSentinel Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Deltek CodeSentinel Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: npm start

      - name: Review Approved
        if: success()
        run: echo "✅ Deltek CodeSentinel approved this PR for merge."

      - name: Review Blocked
        if: failure()
        run: |
          echo "🚫 Deltek CodeSentinel has requested changes."
          echo "Fix the reported issues, push your changes, and the bot will re-review automatically."
