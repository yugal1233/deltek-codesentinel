# Basic usage — add this file as .github/workflows/codesentinel.yml in any repo
# Only requirement: add ANTHROPIC_API_KEY as a repository secret

name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: CodeSentinel Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeSentinel
        uses: yugal1233/deltek-codesentinel@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
